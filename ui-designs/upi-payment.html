<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPI Payment — Abhishek Bandi</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    * { box-sizing: border-box; }

    @keyframes slideIn {
      from { transform: translateY(100vh); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(100vh); opacity: 0; }
    }

    .ui-page-wrapper {
      min-height: 100vh;
      background: var(--white);
      animation: slideIn 0.45s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }
    .ui-page-wrapper.closing {
      animation: slideOut 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }

    .ui-close-btn {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 200;
      width: 40px; height: 40px;
      border: 1px solid var(--grey-200);
      border-radius: 50%;
      background: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--grey-600);
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .ui-close-btn:hover { border-color: var(--black); background: var(--black); color: var(--white); }

    .ui-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 40px;
      border-bottom: 1px solid var(--grey-200);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 100;
      padding-right: 96px;
    }
    .ui-page-title { font-family: var(--font-display); font-size: clamp(24px, 3vw, 40px); font-weight: 300; color: var(--black); line-height: 1.1; }
    .ui-page-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-600); background: var(--grey-100); border: 1px solid var(--grey-200); padding: 4px 12px; border-radius: 20px; }
    .ui-page-year { font-size: 11px; color: var(--grey-400); border: 1px solid var(--grey-200); padding: 4px 12px; border-radius: 20px; }
    .ui-content { max-width: 1080px; margin: 0 auto; padding: 56px 40px 80px; }
    .ui-section { margin-bottom: 48px; }
    .ui-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey-400); margin-bottom: 20px; }
    .ui-image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .ui-img-slot { background: var(--grey-100); border: 2px dashed var(--grey-200); border-radius: 12px; height: 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .ui-img-slot span { font-size: 28px; opacity: 0.4; color: var(--grey-400); }
    .ui-img-slot p { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-400); margin: 0; }
    .cs-figma-bar { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: var(--grey-100); border: 1px solid var(--grey-200); border-radius: 10px; padding: 14px 20px; margin-top: 16px; text-decoration: none; transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease; }
    .cs-figma-bar:hover { background: var(--grey-200); border-color: var(--grey-400); box-shadow: 0 4px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .cs-figma-bar:hover .cs-figma-icon svg { transform: scale(1.08); }
    .cs-figma-bar-left { display: flex; align-items: center; gap: 12px; }
    .cs-figma-icon { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cs-figma-icon svg { width: 38px; height: 57px; transition: transform 0.2s ease; }
    .cs-figma-bar-text { font-size: 13px; color: var(--grey-600); }
    .cs-figma-bar-text strong { font-size: 13px; font-weight: 600; color: var(--black); margin-bottom: 0; }
    .cs-figma-btn { font-size: 12px; font-weight: 500; color: var(--black); border: 1px solid var(--grey-200); border-radius: 6px; padding: 6px 14px; white-space: nowrap; background: var(--white); flex-shrink: 0; }
    @media (max-width: 900px) { .ui-image-grid { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .ui-page-header { padding: 24px; padding-right: 80px; }
      .ui-close-btn { top: 20px; right: 20px; }
      .ui-content { padding: 40px 24px 60px; }
    }
  </style>
</head>
<body>

  <button class="ui-close-btn" onclick="closePage()">✕</button>

    <header class="ui-page-header">

          <div class="ui-img-slot"><span>⬚</span><p>Screen 04</p></div>
        </div>
      </div>

                <path d="M19 0V19H28.5C31.0196 19 33.4359 17.9991 35.2175 16.2175C36.9991 14.4359 38 12.0196 38 9.5C38 6.98044 36.9991 4.56408 35.2175 2.78249C33.4359 1.00089 31.0196 0 28.5 0H19Z" fill="#FF7262"/>

              </svg>
            </div>
            <div class="cs-figma-bar-text">
              <strong>View in Figma</strong>
              UPI Payment — Full File
            </div>
          </div>
          <span class="cs-figma-btn">Open Figma →</span>
        </a>
        -->
      </div>
    </div>
  </div>

  <script>
    function closePage() {
      var wrapper = document.getElementById('pageWrapper');
      wrapper.classList.add('closing');
      setTimeout(function() { history.back(); }, 380);
    }
  </script>

<script src="../lightbox.js"></script>
