<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-M61TBLCZH4"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-M61TBLCZH4");
    </script>
    <link rel="icon" type="image/png" href="../images/index/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPI Payment — Abhishek Bandi</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      @keyframes slideIn {
        from {
          transform: translateY(100vh);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes slideOut {
        from {
          transform: translateY(0);
          opacity: 1;
        }
        to {
          transform: translateY(100vh);
          opacity: 0;
        }
      }

      .ui-page-wrapper {
        min-height: 100vh;
        background: var(--white);
        animation: slideIn 0.45s cubic-bezier(0.32, 0.72, 0, 1) forwards;
      }
      .ui-page-wrapper.closing {
        animation: slideOut 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
      }

      .ui-close-btn {
        position: fixed;
        top: 28px;
        right: 32px;
        z-index: 200;
        width: 40px;
        height: 40px;
        border: 1px solid var(--grey-200);
        border-radius: 50%;
        background: var(--white);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: var(--grey-600);
        transition:
          border-color 0.2s,
          background 0.2s,
          color 0.2s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .ui-close-btn:hover {
        border-color: var(--black);
        background: var(--black);
        color: var(--white);
      }

      .ui-page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 32px 40px;
        border-bottom: 1px solid var(--grey-200);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: var(--white);
        z-index: 100;
        padding-right: 96px;
      }
      .ui-page-title {
        font-family: var(--font-display);
        font-size: clamp(24px, 3vw, 40px);
        font-weight: 300;
        color: var(--black);
        line-height: 1.1;
      }
      .ui-page-tag {
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--grey-600);
        background: var(--grey-100);
        border: 1px solid var(--grey-200);
        padding: 4px 12px;
        border-radius: 20px;
      }
      .ui-page-year {
        font-size: 11px;
        color: var(--grey-400);
        border: 1px solid var(--grey-200);
        padding: 4px 12px;
        border-radius: 20px;
      }
      .ui-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 56px 40px 80px;
        padding-top: 120px;
      }
      .ui-section {
        margin-bottom: 48px;
      }
      .ui-section-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--grey-400);
        margin-bottom: 12px;
      }
      .upi-section-desc {
        font-size: 32px;
        color: var(--grey-600);
        line-height: 1.5;
        margin: 48px 0 48px;
        max-width: 86%;
      }
      .upi-section-desc .highlight {
        font-weight: 700;
        color: #1a73e8;
      }
      /* ── Figma layout ── */
      .upi-figma-layout {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .upi-top-row {
        display: flex;
        gap: 12px;
        align-items: stretch;
      }
      .upi-blue-left {
        flex: 0 0 54%;
        min-height: 440px;
        background: #edf4fe;
        border: 1px solid #d4e4fc;
        border-radius: 16px;
        overflow: hidden;
      }
      .upi-blue-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .upi-right-stack {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Hero text card */
      .upi-hero-card {
        background: #edf4fe;
        border: 1px solid #d4e4fc;
        border-radius: 16px;
        overflow: hidden;
        flex: 0 0 auto;
        height: 340px;
      }
      .upi-hero-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Phone card (small, top-right bottom) */
      .upi-phone-card-sm {
        flex: 1;
        background: #edf4fe;
        border: 1px solid #d4e4fc;
        border-radius: 16px;
        overflow: hidden;
        min-height: 280px;
      }
      .upi-phone-card-sm img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Phone mockup card (large, bottom-left) */
      .upi-bottom-row {
        display: flex;
        gap: 12px;
        align-items: stretch;
      }
      .upi-phone-card-lg {
        flex: 1;
        min-height: 420px;
        background: #edf4fe;
        border: 1px solid #d4e4fc;
        border-radius: 16px;
        overflow: hidden;
      }
      .upi-phone-card-lg img,
      .upi-phone-card-lg video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .upi-blue-right {
        flex: 0 0 56%;
        background: #edf4fe;
        border: 1px solid #d4e4fc;
        border-radius: 16px;
        overflow: hidden;
      }
      .upi-blue-right img,
      .upi-blue-right video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .upi-back-home {
        text-align: center;
        padding: 64px 0 40px;
      }
      .upi-back-link {
        font-size: 14px;
        font-weight: 500;
        color: var(--grey-500);
        text-decoration: none;
        letter-spacing: 0.02em;
        transition: color 0.2s;
      }
      .upi-back-link:hover { color: var(--black); }

      /* ── Hover border light animation ── */
      @property --border-angle {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
      }

      @keyframes border-spin {
        to { --border-angle: 360deg; }
      }

      .upi-blue-left,
      .upi-hero-card,
      .upi-phone-card-sm,
      .upi-phone-card-lg,
      .upi-blue-right {
        position: relative;
      }

      .upi-blue-left::after,
      .upi-hero-card::after,
      .upi-phone-card-sm::after,
      .upi-phone-card-lg::after,
      .upi-blue-right::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 2px;
        background: conic-gradient(
          from var(--border-angle),
          transparent 72%,
          rgba(26, 115, 232, 0.1) 80%,
          rgba(26, 115, 232, 0.6) 86%,
          #1a73e8 89%,
          rgba(26, 115, 232, 0.6) 92%,
          rgba(26, 115, 232, 0.1) 97%,
          transparent 100%
        );
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
        z-index: 10;
      }

      .upi-blue-left:hover::after,
      .upi-hero-card:hover::after,
      .upi-phone-card-sm:hover::after,
      .upi-phone-card-lg:hover::after,
      .upi-blue-right:hover::after {
        opacity: 1;
        animation: border-spin 2.5s linear infinite;
      }

      @media (max-width: 700px) {
        .upi-top-row,
        .upi-bottom-row {
          flex-direction: column;
        }
        .upi-blue-left,
        .upi-blue-right {
          min-height: 260px;
          flex: unset;
          width: 100%;
        }
        .upi-right-stack {
          flex: 1;
        }
        .upi-hero-card {
          height: auto;
          min-height: 220px;
        }
        .upi-phone-card-sm {
          min-height: 240px;
        }
        .upi-phone-card-lg {
          min-height: 280px;
        }
        .upi-section-desc {
          font-size: 20px;
          margin: 24px 0 32px;
          max-width: 100%;
        }
      }
      .cs-figma-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        background: var(--grey-100);
        border: 1px solid var(--grey-200);
        border-radius: 10px;
        padding: 14px 20px;
        margin-top: 16px;
        text-decoration: none;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }
      .cs-figma-bar:hover {
        background: var(--grey-200);
        border-color: var(--grey-400);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        transform: translateY(-2px);
      }
      .cs-figma-bar:hover .cs-figma-icon svg {
        transform: scale(1.08);
      }
      .cs-figma-bar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .cs-figma-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cs-figma-icon svg {
        width: 38px;
        height: 57px;
        transition: transform 0.2s ease;
      }
      .cs-figma-bar-text {
        font-size: 13px;
        color: var(--grey-600);
      }
      .cs-figma-bar-text strong {
        font-size: 13px;
        font-weight: 600;
        color: var(--black);
        margin-bottom: 0;
      }
      .cs-figma-btn {
        font-size: 12px;
        font-weight: 500;
        color: var(--black);
        border: 1px solid var(--grey-200);
        border-radius: 6px;
        padding: 6px 14px;
        white-space: nowrap;
        background: var(--white);
        flex-shrink: 0;
      }
      @media (max-width: 600px) {
        .ui-page-header {
          padding: 20px 24px;
          padding-right: 72px;
        }
        .ui-close-btn {
          top: 16px;
          right: 16px;
        }
        .ui-content {
          padding: 100px 16px 60px;
        }
        .upi-figma-layout {
          gap: 8px;
        }
        .upi-back-home {
          padding: 40px 0 24px;
        }
      }
    </style>
  </head>
  <body>
    <button class="ui-close-btn" onclick="closePage()">✕</button>

    <header class="ui-page-header">
      <h1 class="ui-page-title">UPI Payment</h1>
      <div style="display: flex; align-items: center; gap: 10px">
        <span class="ui-page-tag">Mobile</span>
        <span class="ui-page-year">2024</span>
      </div>
    </header>

    <div class="ui-page-wrapper" id="pageWrapper">
      <div class="ui-content">
        <div class="ui-section">
          <p class="upi-section-desc">
            Designed a <span class="highlight">UPI payment interface</span> focused on clarity, trust, and seamless user flow. A UI exploration translating a familiar payment experience.
          </p>
          <div class="upi-figma-layout">
            <!-- Row 1 -->
            <div class="upi-top-row">
              <!-- Left: decorative blue panel -->
              <div class="upi-blue-left"><img src="../images/ui-designs/upi-payments/upi_image_1.jpg" alt="UPI Payment Screen 01" /></div>

              <!-- Right: stacked cards -->
              <div class="upi-right-stack">
                <!-- Hero card -->
                <div class="upi-hero-card">
                  <img
                    src="../images/ui-designs/upi-payments/upi_image_2.jpg"
                    alt="UPI Payment Screen 02"
                  />
                </div>

                <!-- Phone card (small) -->
                <div class="upi-phone-card-sm">
                  <img
                    src="../images/ui-designs/upi-payments/upi_image_3.jpg"
                    alt="UPI Payment Screen 03"
                  />
                </div>
              </div>
            </div>

            <!-- Row 2 -->
            <div class="upi-bottom-row">
              <!-- Phone card (large) -->
              <div class="upi-phone-card-lg">
                <img src="../images/ui-designs/upi-payments/upi_image_4.jpg" alt="UPI Payment Screen 04" />
              </div>

              <!-- Right: decorative blue panel -->
              <div class="upi-blue-right">
                <video src="../images/ui-designs/upi-payments/ui_design_5.mp4" autoplay loop muted playsinline></video>
              </div>
            </div>
          </div>
        </div>
        <div class="upi-back-home">
          <a href="../index.html" class="upi-back-link" onclick="closePage(); return false;">← Back to Home</a>
        </div>
      </div>
    </div>

    <script>
      window.scrollTo(0, 0);
      if (history.scrollRestoration) {
        history.scrollRestoration = "manual";
      }

      function closePage() {
        var wrapper = document.getElementById("pageWrapper");
        wrapper.classList.add("closing");
        setTimeout(function () {
          history.back();
        }, 380);
      }
    </script>

    <script src="../lightbox.js"></script>
  </body>
</html>
