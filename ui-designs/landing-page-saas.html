<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M61TBLCZH4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-M61TBLCZH4');
  </script>
  <link rel="icon" type="image/png" href="../images/index/Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page for SaaS Product — Abhishek Bandi</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    * { box-sizing: border-box; }

    @keyframes slideIn {
      from { transform: translateY(100vh); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(100vh); opacity: 0; }
    }

    .ui-page-wrapper {
      min-height: 100vh;
      background: var(--white);
      animation: slideIn 0.45s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }
    .ui-page-wrapper.closing {
      animation: slideOut 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }

    .ui-close-btn {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 200;
      width: 40px; height: 40px;
      border: 1px solid var(--grey-200);
      border-radius: 50%;
      background: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--grey-600);
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .ui-close-btn:hover { border-color: var(--black); background: var(--black); color: var(--white); }

    .ui-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 40px;
      border-bottom: 1px solid var(--grey-200);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--white);
      z-index: 100;
      padding-right: 96px;
    }
    .ui-page-title { font-family: var(--font-display); font-size: clamp(24px, 3vw, 40px); font-weight: 300; color: var(--black); line-height: 1.1; }
    .ui-page-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-600); background: var(--grey-100); border: 1px solid var(--grey-200); padding: 4px 12px; border-radius: 20px; }
    .ui-page-year { font-size: 11px; color: var(--grey-400); border: 1px solid var(--grey-200); padding: 4px 12px; border-radius: 20px; }
    .ui-content { max-width: 1200px; margin: 0 auto; padding: 56px 40px 80px; padding-top: 120px; }
    .ui-section { margin-bottom: 48px; }
    .ui-section-desc { font-size: 32px; color: var(--grey-600); line-height: 1.5; margin: 48px 0; max-width: 86%; }
    .ui-section-desc .highlight { font-weight: 700; color: #29102D; }
    /* ── Bento layout ── */
    .lp-layout {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .lp-top-row, .lp-bottom-row {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }
    .lp-cell {
      background: rgba(41, 16, 45, 0.05);
      border: 1px solid rgba(41, 16, 45, 0.15);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }
    .lp-cell img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .lp-left       { flex: 0 0 54%; min-height: 440px; }
    .lp-right-stack { flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .lp-hero        { height: 340px; flex-shrink: 0; }
    .lp-sm          { flex: 1; min-height: 200px; }
    .lp-bottom-left  { flex: 1; min-height: 420px; }
    .lp-bottom-right { flex: 0 0 56%; min-height: 420px; }
    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes border-spin {
      to { --border-angle: 360deg; }
    }
    .lp-cell::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(
        from var(--border-angle),
        transparent 72%,
        rgba(41, 16, 45, 0.1) 80%,
        rgba(41, 16, 45, 0.6) 86%,
        #29102D 89%,
        rgba(41, 16, 45, 0.6) 92%,
        rgba(41, 16, 45, 0.1) 97%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 10;
    }
    .lp-cell:hover::after {
      opacity: 1;
      animation: border-spin 2.5s linear infinite;
    }
    .ui-back-home { text-align: center; padding: 64px 0 40px; }
    .ui-back-link { font-size: 14px; font-weight: 500; color: var(--grey-500); text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s; }
    .ui-back-link:hover { color: var(--black); }
    @media (max-width: 700px) {
      .lp-top-row, .lp-bottom-row { flex-direction: column; }
      .lp-left, .lp-bottom-left, .lp-bottom-right { flex: unset; width: 100%; min-height: 260px; }
      .lp-right-stack { flex: 1; }
      .lp-hero { height: auto; min-height: 220px; }
      .lp-sm { min-height: 200px; }
      .ui-section-desc { font-size: 20px; margin: 24px 0 32px; max-width: 100%; }
    }
    @media (max-width: 600px) {
      .ui-page-header { padding: 24px; padding-right: 80px; }
      .ui-close-btn { top: 20px; right: 20px; }
      .ui-content { padding: 24px 20px 60px; padding-top: 100px; }
      .lp-left, .lp-bottom-left, .lp-bottom-right { min-height: 220px; }
      .lp-hero { min-height: 200px; }
      .lp-sm { min-height: 180px; }
    }
  </style>
</head>
<body>

  <button class="ui-close-btn" onclick="closePage()">✕</button>

  <header class="ui-page-header">
    <h1 class="ui-page-title">Landing Page for SaaS Product</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="ui-page-tag">Web</span>
      <span class="ui-page-year">2023</span>
    </div>
  </header>

  <div class="ui-page-wrapper" id="pageWrapper">
    <div class="ui-content">
      <div class="ui-section">
        <p class="ui-section-desc">
          Designed a <span class="highlight">SaaS landing page</span> focused on conversion, clarity, and a clean visual hierarchy. A UI exploration balancing marketing intent with modern aesthetics.
        </p>
        <div class="lp-layout">
          <!-- Top row -->
          <div class="lp-top-row">
            <div class="lp-cell lp-left">
              <img loading="lazy" src="../images/ui-designs/landing-page-saas/landing_page_ui_1.png" alt="Landing Page Screen 01" />
            </div>
            <div class="lp-right-stack">
              <div class="lp-cell lp-hero">
                <img loading="lazy" src="../images/ui-designs/landing-page-saas/landing_page_ui_2.png" alt="Landing Page Screen 02" />
              </div>
              <div class="lp-cell lp-sm">
                <img loading="lazy" src="../images/ui-designs/landing-page-saas/landing_page_ui_3.png" alt="Landing Page Screen 03" />
              </div>
            </div>
          </div>
          <!-- Bottom row -->
          <div class="lp-bottom-row">
            <div class="lp-cell lp-bottom-left">
              <img loading="lazy" src="../images/ui-designs/landing-page-saas/landing_page_ui_4.png" alt="Landing Page Screen 04" />
            </div>
            <div class="lp-cell lp-bottom-right">
              <img loading="lazy" src="../images/ui-designs/landing-page-saas/landing_page_ui_5.png" alt="Landing Page Screen 05" />
            </div>
          </div>
        </div>
      </div>
      <div class="ui-back-home">
        <a href="../index.html" class="ui-back-link" onclick="closePage(); return false;">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function closePage() {
      var wrapper = document.getElementById('pageWrapper');
      wrapper.classList.add('closing');
      setTimeout(function() { history.back(); }, 380);
    }
  </script>

<script src="../lightbox.js"></script>
</body>
</html>
