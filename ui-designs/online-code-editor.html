<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M61TBLCZH4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-M61TBLCZH4');
  </script>
  <link rel="icon" type="image/png" href="../images/index/Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Code Editor — Abhishek Bandi</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    * { box-sizing: border-box; }

    @keyframes slideIn {
      from { transform: translateY(100vh); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateY(0);    opacity: 1; }
      to   { transform: translateY(100vh); opacity: 0; }
    }

    .ui-page-wrapper {
      min-height: 100vh;
      background: var(--white);
      animation: slideIn 0.45s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }
    .ui-page-wrapper.closing {
      animation: slideOut 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards;
    }

    .ui-close-btn {
      position: fixed;
      top: 28px;
      right: 32px;
      z-index: 200;
      width: 40px; height: 40px;
      border: 1px solid var(--grey-200);
      border-radius: 50%;
      background: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--grey-600);
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .ui-close-btn:hover { border-color: var(--black); background: var(--black); color: var(--white); }

    .ui-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 40px;
      border-bottom: 1px solid var(--grey-200);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--white);
      z-index: 100;
      padding-right: 96px;
    }
    .ui-page-title { font-family: var(--font-display); font-size: clamp(24px, 3vw, 40px); font-weight: 300; color: var(--black); line-height: 1.1; }
    .ui-page-tag { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-600); background: var(--grey-100); border: 1px solid var(--grey-200); padding: 4px 12px; border-radius: 20px; }
    .ui-page-year { font-size: 11px; color: var(--grey-400); border: 1px solid var(--grey-200); padding: 4px 12px; border-radius: 20px; }
    .ui-content { max-width: 1200px; margin: 0 auto; padding: 56px 40px 80px; padding-top: 120px; }
    .ui-section { margin-bottom: 48px; }
    .ui-section-desc { font-size: 32px; color: var(--grey-600); line-height: 1.5; margin: 48px 0; max-width: 86%; }
    .ui-section-desc .highlight { font-weight: 700; color: #505AFA; }
    /* ── Bento layout ── */
    .oce-layout { display: flex; flex-direction: column; gap: 20px; }
    .oce-row { display: flex; gap: 20px; }
    .oce-cell {
      background: #f5f5ff;
      border: 1px solid rgba(80, 90, 250, 0.12);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      min-width: 0;
      flex-shrink: 0;
    }
    .oce-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Row 1: large left ~62.5%, small right ~37.5% */
    .oce-row-1 .oce-cell:nth-child(1) { flex: 0 0 calc(62.5% - 10px); height: 460px; }
    .oce-row-1 .oce-cell:nth-child(2) { flex: 1 1 0; height: 460px; }

    /* Row 2: 3 cells proportional to 440:440:336 */
    .oce-row-2 .oce-cell:nth-child(1) { flex: 440 1 0; height: 380px; }
    .oce-row-2 .oce-cell:nth-child(2) { flex: 440 1 0; height: 380px; }
    .oce-row-2 .oce-cell:nth-child(3) { flex: 336 1 0; height: 380px; }

    /* Row 3: small left ~37.5%, large right ~62.5% (mirrored) */
    .oce-row-3 .oce-cell:nth-child(1) { flex: 1 1 0; height: 460px; }
    .oce-row-3 .oce-cell:nth-child(2) { flex: 0 0 calc(62.5% - 10px); height: 460px; }

    /* Hover animation */
    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes border-spin {
      to { --border-angle: 360deg; }
    }
    .oce-cell::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(
        from var(--border-angle),
        transparent 72%,
        rgba(80, 90, 250, 0.1) 80%,
        rgba(80, 90, 250, 0.6) 86%,
        #505AFA 89%,
        rgba(80, 90, 250, 0.6) 92%,
        rgba(80, 90, 250, 0.1) 97%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 10;
    }
    .oce-cell:hover::after {
      opacity: 1;
      animation: border-spin 2.5s linear infinite;
    }
    .ui-back-home { text-align: center; padding: 64px 0 40px; }
    .ui-back-link { font-size: 14px; font-weight: 500; color: var(--grey-500); text-decoration: none; letter-spacing: 0.02em; transition: color 0.2s; }
    .ui-back-link:hover { color: var(--black); }
    @media (max-width: 700px) {
      .oce-row { flex-direction: column; }
      .oce-row-1 .oce-cell:nth-child(1),
      .oce-row-1 .oce-cell:nth-child(2),
      .oce-row-3 .oce-cell:nth-child(1),
      .oce-row-3 .oce-cell:nth-child(2) { flex: unset; width: 100%; height: auto; min-height: 240px; }
      .oce-row-2 .oce-cell:nth-child(1),
      .oce-row-2 .oce-cell:nth-child(2),
      .oce-row-2 .oce-cell:nth-child(3) { flex: unset; width: 100%; height: auto; min-height: 260px; }
      .ui-section-desc { font-size: 20px; margin: 24px 0 32px; max-width: 100%; }
    }
    @media (max-width: 600px) {
      .ui-page-header { padding: 24px; padding-right: 80px; }
      .ui-close-btn { top: 20px; right: 20px; }
      .ui-content { padding: 24px 20px 60px; padding-top: 100px; }
      .oce-layout { gap: 12px; }
      .oce-row { gap: 12px; }
    }
  </style>
</head>
<body>

  <button class="ui-close-btn" onclick="closePage()">✕</button>

  <header class="ui-page-header">
    <h1 class="ui-page-title">Online Code Editor</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="ui-page-tag">Web</span>
      <span class="ui-page-year">2023</span>
    </div>
  </header>

  <div class="ui-page-wrapper" id="pageWrapper">
    <div class="ui-content">
      <div class="ui-section">
        <p class="ui-section-desc">
          Designed an <span class="highlight">online code editor</span> focused on developer experience, readability, and a distraction-free interface. A UI exploration for a browser-based coding environment.
        </p>
        <div class="oce-layout">

          <!-- Row 1: large left + smaller right -->
          <div class="oce-row oce-row-1">
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_1.png" alt="Online Code Editor Screen 01" />
            </div>
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_2.png" alt="Online Code Editor Screen 02" />
            </div>
          </div>

          <!-- Row 2: 3 squares -->
          <div class="oce-row oce-row-2">
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_3.png" alt="Online Code Editor Screen 03" />
            </div>
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_4.png" alt="Online Code Editor Screen 04" />
            </div>
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_5.png" alt="Online Code Editor Screen 05" />
            </div>
          </div>

          <!-- Row 3: smaller left + large right (mirrored) -->
          <div class="oce-row oce-row-3">
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_6.png" alt="Online Code Editor Screen 06" />
            </div>
            <div class="oce-cell">
              <img loading="lazy" src="../images/ui-designs/online-code-editor/online_code_editor_7.png" alt="Online Code Editor Screen 07" />
            </div>
          </div>

        </div>
      </div>
      <div class="ui-back-home">
        <a href="../index.html" class="ui-back-link" onclick="closePage(); return false;">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function closePage() {
      var wrapper = document.getElementById('pageWrapper');
      wrapper.classList.add('closing');
      setTimeout(function() { history.back(); }, 380);
    }
  </script>

<script src="../lightbox.js"></script>
</body>
</html>
