  <link rel="stylesheet" href="style.css" />
  <style>
    .error-wrap {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
    }
    .error-inner {
      max-width: 480px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 300;
      line-height: 1;
      color: var(--grey-200);
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 300;
      color: var(--black);
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .error-desc {
      font-size: 15px;
      line-height: 1.7;
      color: var(--grey-600);
      margin-bottom: 40px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-link-secondary {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--grey-600);
      text-decoration: none;
      border: 1px solid var(--grey-200);
      padding: 11px 24px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .error-link-secondary:hover {
      border-color: var(--black);
      color: var(--black);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">

        <li><a href="resume.html">Resume</a></li>

    </div>
  </nav>

  <main>
    <div class="error-wrap">

    </div>

    </div>
  </footer>
